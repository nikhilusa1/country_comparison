<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Country Size Comparison</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/d3-geo@3"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
  <style>
    :root {
  --bg: #ffffff;
  --surface: #f3f4f6;
  --text: #111827;
  --text-muted: #6b7280;
  --border: #e5e7eb;
  --transition: 0.3s ease;
}
[data-theme="dark"] {
  --bg: #0f172a;
  --surface: #1e293b;
  --text: #f1f5f9;
  --text-muted: #94a3b8;
  --border: #334155;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  transition: background var(--transition), color var(--transition);
}
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1rem 2rem;
  border-bottom: 1px solid var(--border);
}
header h1 { font-size: 1.25rem; font-weight: 900; }
#theme-toggle {
  background: none;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.4rem 0.75rem;
  cursor: pointer;
  font-size: 1rem;
  color: var(--text);
}
main { max-width: 900px; margin: 0 auto; padding: 2rem 1rem; }
.input-row {
  display: flex;
  flex-wrap: wrap;
  gap: 0.75rem;
  justify-content: center;
  margin-bottom: 2rem;
}
.input-row input {
  flex: 1;
  min-width: 200px;
  padding: 0.75rem 1rem;
  border: 2px solid var(--border);
  border-radius: 12px;
  background: var(--surface);
  color: var(--text);
  font-size: 1rem;
  font-family: inherit;
  transition: border-color var(--transition);
}
.input-row input:focus { outline: none; border-color: #38BDF8; }
#compare-btn {
  padding: 0.75rem 2rem;
  background: #38BDF8;
  color: #fff;
  border: none;
  border-radius: 12px;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  transition: opacity var(--transition), transform var(--transition);
}
#compare-btn:disabled { opacity: 0.4; cursor: not-allowed; }
#compare-btn:not(:disabled):hover { transform: translateY(-1px); }
.welcome { text-align: center; padding: 4rem 2rem; color: var(--text-muted); }
.globe { font-size: 4rem; margin-bottom: 1rem; }
.welcome p { font-size: 1.125rem; }
.hidden { display: none !important; }
.results { animation: fadeIn var(--transition) forwards; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.cards {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.5rem;
  margin-bottom: 1.5rem;
}
.card {
  border-radius: 20px;
  padding: 1.5rem;
  background: var(--surface);
  border: 2px solid var(--border);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1rem;
  min-height: 280px;
  transition: border-color var(--transition);
}
.card.error { border-color: #ef4444; }
.card .error-msg { color: #ef4444; font-size: 0.9rem; text-align: center; margin-top: 2rem; }
.card svg {
  width: 100%;
  height: 180px;
  animation: scaleIn 0.4s ease forwards;
}
@keyframes scaleIn {
  from { transform: scale(0.85); opacity: 0; }
  to   { transform: scale(1); opacity: 1; }
}
.card .country-name { font-size: 1.25rem; font-weight: 700; }
.card .country-area { font-size: 2rem; font-weight: 900; letter-spacing: -0.5px; }
.result-banner {
  border-radius: 16px;
  padding: 1.25rem 2rem;
  text-align: center;
  font-size: 1.25rem;
  font-weight: 700;
  color: #fff;
  margin-bottom: 1.5rem;
}
.restart {
  display: block;
  margin: 0 auto;
  padding: 0.75rem 2.5rem;
  background: var(--text);
  color: var(--bg);
  border: none;
  border-radius: 12px;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  transition: opacity var(--transition);
}
.restart:hover { opacity: 0.8; }
@media (max-width: 640px) {
  .cards { grid-template-columns: 1fr; }
  .input-row { flex-direction: column; }
  #compare-btn { width: 100%; }
}
/* Compare button loading state */
#compare-btn.loading {
  opacity: 0.7;
  cursor: wait;
  pointer-events: none;
}
#compare-btn.loading::after {
  content: ' ⏳';
}
/* Results fade-out on Restart */
.results.exiting {
  animation: fadeOut 0.25s ease forwards;
}
@keyframes fadeOut {
  from { opacity: 1; transform: translateY(0); }
  to   { opacity: 0; transform: translateY(8px); }
}
  </style>
</head>
<body>
  <header>
    <h1>Country Size Comparison</h1>
    <button id="theme-toggle" aria-label="Toggle dark mode">🌙</button>
  </header>

  <main>
    <section class="input-row">
      <input type="text" id="country1" placeholder="Country 1" autocomplete="off" />
      <input type="text" id="country2" placeholder="Country 2" autocomplete="off" />
      <button id="compare-btn" disabled>Compare</button>
    </section>

    <section id="welcome-state" class="welcome">
      <div class="globe">🌍</div>
      <p>Type two countries above to compare their sizes</p>
    </section>

    <section id="results" class="results hidden">
      <div class="cards">
        <div id="card1" class="card"></div>
        <div id="card2" class="card"></div>
      </div>
      <div id="result-banner" class="result-banner" aria-live="polite"></div>
      <button id="restart-btn" class="restart">Restart</button>
    </section>
  </main>

  <script>

</body>
</html>
